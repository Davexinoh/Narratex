<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Narratex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 16px;
      padding: 40px;
    }
    .landing .logo {
      font-size: 48px;
      letter-spacing: 0.16em;
    }
    .landing p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: #64748b;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      max-width: 320px;
    }
    .cta {
      margin-top: 16px;
      display: inline-block;
      background: #f0b90b;
      color: #000;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 6px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .cta:hover {
      opacity: 0.85;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="landing">
    <div class="logo">NARRATEX</div>
    <p>Discover market narratives before they trend.</p>
    <a class="cta" href="dashboard.html">Open Dashboard →</a>
  </div>
</body>
</html>
