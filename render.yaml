services:
  - type: web
    name: narratex
    runtime: python
    buildCommand: pip install -r requirements.txt
    # workers 1 is intentional — the in-memory cache in api.py
    # requires a single process. Multiple workers = separate cache dicts.
    startCommand: cd backend && gunicorn api:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true
